version: '3.8'

networks:
  coolify:
    external: true

services:
  app:
    build: .
    expose:
      - '3000'
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/multitenant
      - ROOT_DOMAIN=${ROOT_DOMAIN}
      - NEXT_PUBLIC_ROOT_DOMAIN=${ROOT_DOMAIN}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - coolify
      - default
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify

      # Service — port the app listens on
      - traefik.http.services.multitenant-app.loadbalancer.server.port=3000

      # HTTPS router — catches root domain + all subdomains
      - "traefik.http.routers.multitenant-https.rule=Host(`enabtech.com`) || HostRegexp(`^.+\\.enabtech\\.com$`)"
      - traefik.http.routers.multitenant-https.entrypoints=https
      - traefik.http.routers.multitenant-https.tls=true
      - traefik.http.routers.multitenant-https.tls.certresolver=letsencrypt
      - traefik.http.routers.multitenant-https.tls.domains[0].main=enabtech.com
      - traefik.http.routers.multitenant-https.tls.domains[0].sans=*.enabtech.com
      - traefik.http.routers.multitenant-https.service=multitenant-app
      - traefik.http.routers.multitenant-https.middlewares=gzip
      - traefik.http.routers.multitenant-https.priority=10

      # HTTP router — redirect to HTTPS
      - "traefik.http.routers.multitenant-http.rule=Host(`enabtech.com`) || HostRegexp(`^.+\\.enabtech\\.com$`)"
      - traefik.http.routers.multitenant-http.entrypoints=http
      - traefik.http.routers.multitenant-http.middlewares=redirect-to-https
      - traefik.http.routers.multitenant-http.priority=10

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=multitenant
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - default

volumes:
  postgres_data:
